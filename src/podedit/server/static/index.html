<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>podedit</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<header>
  <div class="title-row">
    <h1 id="audio-name">Loading…</h1>
    <div class="meta" id="audio-meta"></div>
  </div>
  <audio id="player" preload="metadata"></audio>
  <canvas id="waveform" class="waveform" height="48" aria-label="audio waveform"></canvas>
  <div class="player-bar">
    <button id="btn-play" class="play-btn" title="Play/Pause (Space)">▶</button>
    <span class="time" id="time-current">0:00.00</span>
    <input id="scrubber" type="range" min="0" max="0" step="0.01" value="0" class="scrubber" aria-label="seek">
    <span class="time time-right" id="time-duration">0:00.00</span>
  </div>
</header>

<div class="toolbar">
  <button id="btn-delete" disabled title="Delete selected range (D)">Delete <kbd>D</kbd></button>
  <button id="btn-undo" disabled title="Undo (⌘Z)">Undo <kbd>⌘Z</kbd></button>
  <button id="btn-redo" disabled title="Redo (⌘⇧Z)">Redo <kbd>⌘⇧Z</kbd></button>
  <button id="btn-clear-sel" disabled title="Clear selection (Esc)">Clear <kbd>Esc</kbd></button>
  <button id="btn-cut" disabled title="Cut selected range to clipboard (⌘X)">Cut <kbd>⌘X</kbd></button>
  <button id="btn-paste-before" disabled title="Paste clipboard before marked word">Paste Before</button>
  <button id="btn-paste-after" disabled title="Paste clipboard after marked word (⌘V)">Paste After <kbd>⌘V</kbd></button>
  <button id="btn-audition" title="Render preview (sample-precise + crossfade + LUFS)">Audition</button>
  <span class="mode-pill" id="mode-pill">source</span>
  <span class="spacer"></span>
  <span class="skip-pill" id="skip-pill" title="Flashes red while playhead is inside a cut">no cut</span>
  <span class="clipboard-pill" id="clipboard-pill" hidden></span>
  <span class="stat"><strong id="kpi-time">0.00s</strong></span>
  <span class="stat"><strong id="kpi-ops">0</strong> ops · <strong id="kpi-cut">0.0s</strong> cut · <strong id="kpi-elapsed">0:00</strong></span>
  <span id="save-status" class="save-idle">·</span>
</div>

<main id="transcript"><div class="status">Loading transcript…</div></main>

<script src="/app.js"></script>
</body>
</html>
